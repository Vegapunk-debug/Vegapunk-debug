<svg width="100%" viewBox="0 0 800 370" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .a1{animation:fadeIn .4s ease .2s both}
    .a2{animation:fadeIn .4s ease .4s both}
    .a3{animation:fadeIn .4s ease .6s both}
    .a4{animation:fadeIn .4s ease .8s both}
    .a5{animation:fadeIn .4s ease 1s both}
    .a6{animation:fadeIn .4s ease 1.2s both}
    .a7{animation:fadeIn .4s ease 1.4s both}
    .p1{animation:pulse 2s ease-in-out infinite}
    .p2{animation:pulse 2s ease-in-out .3s infinite}
    .p3{animation:pulse 2s ease-in-out .6s infinite}
    .p4{animation:pulse 2s ease-in-out .9s infinite}
    .p5{animation:pulse 2s ease-in-out 1.2s infinite}
    .p6{animation:pulse 2s ease-in-out 1.5s infinite}
    .p7{animation:pulse 2s ease-in-out 1.8s infinite}
  </style></defs>

  <rect width="800" height="370" rx="12" fill="#0d1117"/>
