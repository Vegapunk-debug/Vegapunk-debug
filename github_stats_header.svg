  <g class="tg">
    <text x="402" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="30" font-weight="700" fill="#082505" letter-spacing="8">GITHUB STATISTICS</text>
    <text x="401" y="41" text-anchor="middle" font-family="Courier New,monospace" font-size="30" font-weight="700" fill="#165708" letter-spacing="8">GITHUB STATISTICS</text>
    <text x="400" y="40" text-anchor="middle" font-family="Courier New,monospace" font-size="30" font-weight="700" fill="#39FF14" letter-spacing="8">GITHUB STATISTICS</text>
  </g>

  <line x1="270" y1="52" x2="530" y2="52" stroke="#39FF14" stroke-width="0.8" class="a1"/>
  <text x="400" y="67" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#8b949e" class="a1">965 commits  ·  29 repos  ·  25 day streak  ·  6+ open source contributions</text>
