    .a1{animation:fadeIn .4s ease .2s both}
    .a2{animation:fadeIn .4s ease .5s both}
    .a3{animation:fadeIn .4s ease .8s both}
    .a4{animation:fadeIn .4s ease 1.1s both}
    .a5{animation:fadeIn .4s ease 1.4s both}
    .a6{animation:fadeIn .4s ease 1.7s both}
    .a7{animation:fadeIn .4s ease 2s both}
    .a8{animation:fadeIn .4s ease 2.3s both}
    .cur{animation:blink 1s step-end infinite}
  </style></defs>

  <rect width="800" height="278" rx="12" fill="#0d1117"/>
  <rect width="800" height="278" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

